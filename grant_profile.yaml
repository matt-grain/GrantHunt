# FloteXa Grant Search Profile
startup:
  name: "FloteXa"
  description: >
    FloteXa designs and deploys vegetated floating islands combining
    phytoremediation and mycoremediation to restore polluted Quebec lakes.
    The FloteX product uses native plants and mycelium to naturally filter
    nutrients, capture heavy metals, and rebuild aquatic biodiversity.
  industry: "Clean Tech / Water Remediation"
  stage: "pre-seed"
  location: "Quebec City, QC, Canada"
  founded_year: 2025
  employees: 6
  website: "https://flotexa.ca/"

