# Grant sources for FloteXa -- organized by category
# priority: 1 (highest relevance) to 5 (lowest)
# Updated 2026-03-23 with research-backed sources

sources:

  # -- Federal (Canada-wide) --

  - id: innovation_canada
    name: "Innovation Canada"
    enabled: true
    priority: 1
    url: "https://innovation.canada.ca/"
    category: "federal"
    notes: >
      Federal portal aggregating programs from NRC, ISED, and other agencies.
      Good starting point for mapping all federal funding.

  - id: irap_cleantech
    name: "NRC IRAP Clean Technology Program"
    enabled: true
    priority: 1
    url: "https://nrc.canada.ca/en/support-technology-innovation/nrc-irap-support-clean-technology"
    category: "federal"
    notes: >
      For-profit SMEs developing innovative clean tech. Multi-year projects.
      Accepting applications as of fiscal 2025-2026. Strong match for FloteXa.

  - id: sred
    name: "SR&ED Tax Credit"
    enabled: true
    priority: 1
    url: "https://www.canada.ca/en/revenue-agency/services/scientific-research-experimental-development-tax-incentive-program.html"
    category: "federal"
    notes: >
      35% refundable tax credit for CCPCs. Mycoremediation R&D is a strong
      candidate given novelty. File annually after fiscal year.

  - id: ecoaction_stream2
    name: "EcoAction Stream 2: Freshwater Innovation"
    enabled: true
    priority: 2
    url: "https://www.canada.ca/en/canada-water-agency/funding/ecoaction-community-program/stream2.html"
    category: "federal"
    notes: >
      Canada Water Agency freshwater protection innovation stream.
      Minimum 50% co-funding required. Lake restoration with nature-based
      solutions is a core priority.

  - id: st_lawrence_fei
    name: "St. Lawrence Freshwater Ecosystem Initiative"
    enabled: true
    priority: 2
    url: "https://www.canada.ca/en/canada-water-agency/funding.html"
    category: "federal"
    notes: >
      Water quality improvement in St. Lawrence tributaries. Up to $200K
      per project. Next call planned fall 2025 for 2026-27 projects.
      Directly relevant for Quebec lake restoration.

  - id: canada_quebec_nature
    name: "Canada-Quebec Nature Agreement"
    enabled: true
    priority: 2
    url: "https://www.canada.ca/en/environment-climate-change/services/integrated-nature-initiatives/nature-agreements/canada-quebec-nature-agreement.html"
    category: "federal"
    notes: >
      $100M transfer to Quebec over 2024-2027 for biodiversity restoration
      aligned with Plan de la nature 2030 / Kunming-Montreal framework.
      Floating islands that restore aquatic habitat qualify.

  - id: clean_growth_hub
    name: "Clean Growth Hub"
    enabled: true
    priority: 3
    url: "https://cleangrowthHub.gc.ca/"
    category: "federal"
    notes: >
      Federal concierge for clean tech funding. Navigates across NRCan,
      ISED, Agriculture Canada. Good for mapping what FloteXa qualifies for.

  # -- Quebec (Provincial) --

  - id: innovensol
    name: "Programme InnovEnSol (MELCCFP)"
    enabled: true
    priority: 1
    url: "https://www.environnement.gouv.qc.ca/programmes/innovensol/index.htm"
    category: "quebec"
    notes: >
      HIGHEST PRIORITY. Demonstration trials for innovative remediation
      including phytoremediation EXPLICITLY. Up to $1M per project (75%
      of eligible expenses). Rolling applications. Contact innovensol@environnement.gouv.qc.ca

  - id: mei
    name: "MEI (Ministere de l'Economie)"
    enabled: true
    priority: 1
    url: "https://www.economie.gouv.qc.ca/en/objective/financing"
    category: "quebec"
    notes: >
      Quebec economic development programs. Multiple streams for
      innovative SMEs and startups.

  - id: investissement_quebec
    name: "Investissement Quebec"
    enabled: true
    priority: 2
    url: "https://www.investquebec.com/quebec/en/financial-products.html"
    category: "quebec"
    notes: >
      Quebec's development bank. Loans, guarantees, equity.
      2 Degres is a partner -- warm introduction possible.

  - id: psree
    name: "PSREE (MELCCFP)"
    enabled: true
    priority: 2
    url: "https://www.environnement.gouv.qc.ca/programmes/psree/index.htm"
    category: "quebec"
    notes: >
      Water resource management and aquatic ecosystem protection.
      Up to $200K per project (50% for private orgs). Framework 2022-2025,
      renewal expected.

  - id: faqdd
    name: "FAQDD Accelerateur de la transition ecologique"
    enabled: true
    priority: 2
    url: "https://faqdd.qc.ca/programmes/accelerateur-de-la-transition-ecologique/"
    category: "quebec"
    notes: >
      $50K-$250K (80% of costs) for ecological transition, biodiversity.
      Note: for NPOs/coops primarily -- FloteXa may need a partner org.
      Contact accelerateur@faqdd.qc.ca

  - id: recyc_quebec
    name: "RECYC-QUEBEC / 2 Degres Partnership"
    enabled: true
    priority: 3
    url: "https://www.recyc-quebec.gouv.qc.ca/"
    category: "quebec"
    notes: >
      Circular economy industrial solutions. $300K over 3 years
      (announced Jan 2026). Biomass valorization from harvested
      islands could qualify. 2 Degres is a direct partner.

  # -- Academic / Collaborative --

  - id: mitacs
    name: "Mitacs Accelerate / Elevate"
    enabled: true
    priority: 1
    url: "https://www.mitacs.ca/our-programs/"
    category: "academic"
    notes: >
      Subsidized hiring of grad students/postdocs for applied R&D.
      FloteXa's INRS partnership makes this immediately actionable.
      ~$15K per intern (company co-funds ~$7.5K). Ongoing intake.

  - id: crsng
    name: "NSERC/CRSNG Alliance Grants"
    enabled: true
    priority: 2
    url: "https://www.nserc-crsng.gc.ca/professors-professeurs/rpp-pp/alliance-alliance_eng.asp"
    category: "academic"
    notes: >
      Industry-academic collaborative research grants. INRS partnership
      enables this. Covers salaries, equipment, overhead. Requires
      matching contribution from FloteXa.

  - id: qcbs
    name: "QCBS Seed Grants"
    enabled: true
    priority: 3
    url: "https://qcbs.ca/research-funding/seed-grants/"
    category: "academic"
    notes: >
      Quebec Centre for Biodiversity Science. Small grants for new
      biodiversity research initiatives. R&D on native plant selection
      for floating islands could qualify.

  # -- Ecosystem / Accelerator --

  - id: aquaentrepreneur
    name: "AquaEntrepreneur Quebec (AquaAction)"
    enabled: true
    priority: 1
    url: "https://aquaaction.org/en/our-programs/aquaentrepreneur/"
    category: "ecosystem"
    notes: >
      8-month water tech startup program. Cohort of 15 companies.
      Government-backed coaching + market connections. FloteXa is
      already in the AquaAction ecosystem from AquaHacking.

defaults:
  region: "Quebec, Canada"
  eligible_regions:
    - "Quebec"
    - "Canada"
    - "National"

deduplication:
  match_fields:
    - organization
    - title
  fuzzy_threshold: 0.85
