{% extends "base.html" %}
{% block title %}Letter of Intent - {{ grant.title }} - GrantHunt{% endblock %}

{% block content %}
<a href="/grants/{{ grant.id }}" class="text-emerald-600 hover:underline mb-4 inline-block">&larr; Back to Grant</a>

<div class="bg-white rounded-lg shadow p-6 mb-6">
    <h1 class="text-2xl font-bold mb-2">Letter of Intent</h1>
    <p class="text-gray-600">{{ grant.title }} &mdash; {{ grant.organization }}</p>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <div class="prose prose-sm max-w-none text-gray-700">
        {{ loi_content | safe }}
    </div>
</div>
{% endblock %}
