<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
     onclick="this.remove()">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-lg" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Add New Grant</h2>
            <button onclick="this.closest('#modal').innerHTML=''" class="text-gray-400 hover:text-gray-600">
                &times;
            </button>
        </div>

        <form hx-post="/grants/add" hx-target="body" hx-swap="outerHTML">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Grant URL *</label>
                <input type="url" name="url" required
                       class="w-full border rounded px-3 py-2"
                       placeholder="https://example.gov/grants/...">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                    <input type="text" name="title" required class="w-full border rounded px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Organization *</label>
                    <input type="text" name="organization" required class="w-full border rounded px-3 py-2">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Program</label>
                    <input type="text" name="program" class="w-full border rounded px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" name="location" class="w-full border rounded px-3 py-2">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deadline</label>
                    <input type="date" name="deadline" class="w-full border rounded px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Grant Type</label>
                    <select name="grant_type" class="w-full border rounded px-3 py-2">
                        <option value="">-- Select type --</option>
                        <option value="grant">Grant</option>
                        <option value="tax_credit">Tax Credit</option>
                        <option value="loan">Loan</option>
                        <option value="non-repayable">Non-Repayable</option>
                        <option value="equity">Equity</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount Min ($)</label>
                    <input type="number" name="amount_min" min="0" class="w-full border rounded px-3 py-2" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount Max ($)</label>
                    <input type="number" name="amount_max" min="0" class="w-full border rounded px-3 py-2" placeholder="0">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                <textarea name="notes" rows="3" class="w-full border rounded px-3 py-2"></textarea>
            </div>

            <div class="flex justify-end gap-3">
                <button type="button" onclick="this.closest('#modal').innerHTML=''"
                        class="px-4 py-2 text-gray-600 hover:text-gray-800">
                    Cancel
                </button>
                <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">
                    Add to Pipeline
                </button>
            </div>
        </form>
    </div>
</div>
